<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>masiro | Multi-Comparison Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@1&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #c9a96e; --bg: #000; --btn-bg: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        header { 
            padding: 15px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 10; 
            background: #050505; 
            border-bottom: 1px solid #222;
        }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 24px; letter-spacing: 0.15em; color: var(--accent); text-transform: lowercase; }

        .file-inputs { display: flex; gap: 15px; align-items: center; }
        .file-input-label { 
            font-size: 11px; 
            font-weight: 600;
            color: #ddd; 
            cursor: pointer; 
            background: var(--btn-bg);
            border: 1px solid #444; 
            padding: 10px 20px; 
            border-radius: 4px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .file-input-label:hover { border-color: var(--accent); background: #252525; }
        .file-input-label.loaded { border-color: #2e7d32; background: #1b2e1b; color: #fff; }
        input[type="file"] { display: none; }

        #comparison-container {
            position: relative;
            flex-grow: 1;
            width: 100%;
            height: 100%;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* 初期状態でもキャンバスが見えるように */
        canvas { 
            max-width: 95%; 
            max-height: 95%; 
            object-fit: contain; 
            box-shadow: 0 0 50px rgba(0,0,0,1);
            background: #111; /* 画像がない時の仮の色 */
            cursor: ew-resize;
        }

        .controls {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            background: #050505;
            border-top: 1px solid #222;
        }

        #record-btn {
            padding: 14px 50px;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: all 0.4s ease;
            border-radius: 4px;
        }
        #record-btn:hover:not(:disabled) { background: var(--accent); color: #000; }
        #record-btn:disabled { opacity: 0.2; cursor: not-allowed; }
        #record-btn.recording { background: #b71c1c; border-color: #ff5252; color: #fff; animation: pulse 2s infinite; }

        #status { 
            position: fixed; top: 85px; left: 50%; transform: translateX(-50%); 
            font-size: 11px; font-weight: 600; color: var(--accent); z-index: 20; 
            background: rgba(0,0,0,0.8); padding: 6px 20px; border: 1px solid #333; border-radius: 30px;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div class="logo">masiro <span>Generator</span></div>
    <div class="file-inputs">
        <label class="file-input-label" id="label-before">1. Select Before<input type="file" id="before-file" accept="image/*"></label>
        <label class="file-input-label" id="label-after">2. Select After<input type="file" id="after-file" accept="image/*"></label>
    </div>
</header>

<div id="status">Upload two images to start</div>

<div id="comparison-container">
    <canvas id="compCanvas"></canvas>
</div>

<div class="controls">
    <button id="record-btn" disabled>Ready to Capture</button>
    <p style="font-size: 10px; color: #444;">Automatic 2-cycle MP4 Export</p>
</div>

<script>
    const canvas = document.getElementById('compCanvas');
    const ctx = canvas.getContext('2d');
    const recordBtn = document.getElementById('record-btn');
    const status = document.getElementById('status');
    const beforeFile = document.getElementById('before-file');
    const afterFile = document.getElementById('after-file');
    const labelBefore = document.getElementById('label-before');
    const labelAfter = document.getElementById('label-after');

    let imgBefore = new Image();
    let imgAfter = new Image();
    let sliderPos = 0.5;
    let beforeReady = false;
    let afterReady = false;

    // 画像読み込み
    function handleFile(file, isBefore) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const tempImg = new Image();
            tempImg.onload = () => {
                if (isBefore) {
                    imgBefore = tempImg;
                    beforeReady = true;
                    labelBefore.classList.add('loaded');
                    labelBefore.innerHTML = "Before: OK";
                } else {
                    imgAfter = tempImg;
                    afterReady = true;
                    labelAfter.classList.add('loaded');
                    labelAfter.innerHTML = "After: OK";
                }
                
                if (beforeReady && afterReady) {
                    recordBtn.disabled = false;
                    status.textContent = "Images Loaded. Ready.";
                } else {
                    status.textContent = "One more image...";
                }
                // 画像が読み込まれたら強制的にリサイズと描画を実行
                resize();
            };
            tempImg.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    beforeFile.onchange = (e) => handleFile(e.target.files[0], true);
    afterFile.onchange = (e) => handleFile(e.target.files[0], false);

    function resize() {
        if (!beforeReady && !afterReady) return;
        
        // Before画像を基準にアスペクト比を計算
        const refImg = beforeReady ? imgBefore : imgAfter;
        const containerWidth = canvas.parentElement.clientWidth * 0.95;
        const containerHeight = canvas.parentElement.clientHeight * 0.95;
        const imgAspect = refImg.width / refImg.height;
        const containerAspect = containerWidth / containerHeight;

        if (containerAspect > imgAspect) {
            canvas.height = containerHeight * window.devicePixelRatio;
            canvas.width = canvas.height * imgAspect;
        } else {
            canvas.width = containerWidth * window.devicePixelRatio;
            canvas.height = canvas.width / imgAspect;
        }
        
        // 描画
        render();
    }
    window.addEventListener('resize', resize);

    function render() {
        const w = canvas.width;
        const h = canvas.height;
        if (w === 0 || h === 0) return;

        ctx.clearRect(0, 0, w, h);

        // 片方だけでも読み込まれていれば描画を試みる
        if (beforeReady) {
            ctx.drawImage(imgBefore, 0, 0, w, h);
        }

        if (afterReady) {
            ctx.save();
            ctx.beginPath();
            ctx.rect(0, 0, w * sliderPos, h);
            ctx.clip();
            ctx.drawImage(imgAfter, 0, 0, w, h);
            ctx.restore();
        }

        // スライダーライン
        if (beforeReady || afterReady) {
            ctx.strokeStyle = '#c9a96e';
            ctx.lineWidth = 4 * window.devicePixelRatio;
            ctx.beginPath();
            ctx.moveTo(w * sliderPos, 0);
            ctx.lineTo(w * sliderPos, h);
            ctx.stroke();
        }
    }

    // スライダー操作
    const handleMove = (e) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = (e.pageX || (e.touches ? e.touches[0].pageX : 0));
        sliderPos = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
        render();
    };
    canvas.addEventListener('mousemove', (e) => { if(e.buttons === 1) handleMove(e); });
    canvas.addEventListener('mousedown', handleMove);
    canvas.addEventListener('touchstart', handleMove);
    canvas.addEventListener('touchmove', handleMove);

    // 録画
    recordBtn.onclick = async () => {
        recordBtn.disabled = true;
        recordBtn.classList.add('recording');
        status.textContent = "RECORDING...";

        const stream = canvas.captureStream(30); 
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
        const chunks = [];
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.download = `masiro_visual_${Date.now()}.mp4`;
            a.href = url;
            a.click();
            recordBtn.disabled = false;
            recordBtn.classList.remove('recording');
            status.textContent = "DONE.";
        };

        recorder.start();
        let startTime = null;
        const duration = 10000; 

        function animate(time) {
            if (!startTime) startTime = time;
            let progress = (time - startTime) / duration;
            if (progress <= 1) {
                const wave = -Math.cos(progress * Math.PI * 4);
                sliderPos = (wave + 1) / 2;
                render();
                requestAnimationFrame(animate);
            } else {
                sliderPos = 1.0;
                render();
                setTimeout(() => recorder.stop(), 1000);
            }
        }
        requestAnimationFrame(animate);
    };
</script>
</body>
</html>
