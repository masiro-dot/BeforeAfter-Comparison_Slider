<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>masiro | Auto Capture Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@1&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #c9a96e; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        header { padding: 25px 40px; display: flex; justify-content: space-between; align-items: center; z-index: 10; background: #000; }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 28px; letter-spacing: 0.15em; color: var(--accent); text-transform: lowercase; }

        #comparison-container {
            position: relative;
            flex-grow: 1;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: ew-resize;
        }

        canvas { max-width: 100%; max-height: 100%; object-fit: contain; }

        .controls {
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            background: #000;
        }

        #record-btn {
            padding: 12px 40px;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            cursor: pointer;
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: all 0.4s ease;
        }
        #record-btn:hover:not(:disabled) { background: var(--accent); color: #000; }
        #record-btn:disabled { opacity: 0.3; cursor: wait; }
        #record-btn.recording { background: #900; border-color: #f00; color: #fff; }

        .hint { font-size: 9px; color: #444; letter-spacing: 0.1em; text-transform: uppercase; }
        #status { position: fixed; top: 90px; left: 50%; transform: translateX(-50%); font-size: 11px; color: var(--accent); z-index: 20; }
    </style>
</head>
<body>

<header>
    <div class="logo">masiro <span>Auto Archive</span></div>
</header>

<div id="status"></div>

<div id="comparison-container">
    <canvas id="compCanvas"></canvas>
</div>

<div class="controls">
    <button id="record-btn">Auto Capture (MP4)</button>
    <p class="hint">Automatic comparison and save</p>
</div>

<script>
    const canvas = document.getElementById('compCanvas');
    const ctx = canvas.getContext('2d');
    const recordBtn = document.getElementById('record-btn');
    const status = document.getElementById('status');

    let imgBefore = new Image();
    let imgAfter = new Image();
    let sliderPos = 0.5;
    let isImagesLoaded = false;

    imgBefore.src = './images/before.webp';
    imgAfter.src = './images/after.webp';

    Promise.all([
        new Promise(r => imgBefore.onload = r),
        new Promise(r => imgAfter.onload = r)
    ]).then(() => {
        isImagesLoaded = true;
        resize();
        render();
    });

    function resize() {
        // 元の画像の比率に基づいてCanvasのサイズを決定
        const containerWidth = canvas.parentElement.clientWidth;
        const containerHeight = canvas.parentElement.clientHeight;
        const imgAspect = imgBefore.width / imgBefore.height;
        const containerAspect = containerWidth / containerHeight;

        if (containerAspect > imgAspect) {
            canvas.height = containerHeight * window.devicePixelRatio;
            canvas.width = canvas.height * imgAspect;
        } else {
            canvas.width = containerWidth * window.devicePixelRatio;
            canvas.height = canvas.width / imgAspect;
        }
        render();
    }
    window.addEventListener('resize', resize);

    function render() {
        if (!isImagesLoaded) return;
        const w = canvas.width;
        const h = canvas.height;
        
        ctx.clearRect(0, 0, w, h);
        
        // Before描画
        ctx.drawImage(imgBefore, 0, 0, w, h);
        
        // Afterをスライダー位置で切り取って描画
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, 0, w * sliderPos, h);
        ctx.clip();
        ctx.drawImage(imgAfter, 0, 0, w, h);
        ctx.restore();

        // スライダーライン
        ctx.strokeStyle = '#c9a96e';
        ctx.lineWidth = 4 * window.devicePixelRatio;
        ctx.beginPath();
        ctx.moveTo(w * sliderPos, 0);
        ctx.lineTo(w * sliderPos, h);
        ctx.stroke();
    }

    const handleMove = (e) => {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.pageX || (e.touches ? e.touches[0].pageX : 0);
        const x = clientX - rect.left;
        sliderPos = Math.max(0, Math.min(1, x / rect.width));
        render();
    };
    canvas.addEventListener('mousemove', (e) => { if(e.buttons === 1) handleMove(e); });
    canvas.addEventListener('mousedown', handleMove);
    canvas.addEventListener('touchstart', handleMove);
    canvas.addEventListener('touchmove', handleMove);

    recordBtn.onclick = async () => {
        recordBtn.disabled = true;
        recordBtn.classList.add('recording');
        status.textContent = "GENERATING MP4...";

        const stream = canvas.captureStream(30); 
        const recorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp9' });
        const chunks = [];

        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.download = `masiro_comparison_${Date.now()}.mp4`;
            a.href = url;
            a.click();
            
            recordBtn.disabled = false;
            recordBtn.classList.remove('recording');
            status.textContent = "SAVED.";
            setTimeout(() => status.textContent = "", 3000);
        };

        recorder.start();

        // --- 自動アニメーション設定 ---
        let startTime = null;
        const duration = 6000; // 6秒かけてゆっくり動かす

        function animate(time) {
            if (!startTime) startTime = time;
            let progress = (time - startTime) / duration;

            if (progress <= 1) {
                // 動き：0.5(中央) -> 0.0(左端) -> 1.0(右端)
                // サイン波を使って滑らかに往復
                sliderPos = 0.5 - Math.sin(progress * Math.PI) * 0.5;
                
                // 後半で右端(1.0)に向かうように調整
                if (progress > 0.5) {
                    sliderPos = (progress - 0.5) * 2;
                } else {
                    sliderPos = 0.5 - (progress * 2) * 0.5;
                }

                render();
                requestAnimationFrame(animate);
            } else {
                // 最後はスライダーを右端(1.0)に固定してAfterを表示
                sliderPos = 1.0;
                render();
                // 1秒停止して余韻を残してから録画終了
                setTimeout(() => recorder.stop(), 1000);
            }
        }
        requestAnimationFrame(animate);
    };
</script>
</body>
</html>
