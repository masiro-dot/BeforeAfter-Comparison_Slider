<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>masiro | Multi-Comparison Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital@1&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #c9a96e; --bg: #000; --btn-bg: #1a1a1a; }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

        /* Header UIの強化 */
        header { 
            padding: 15px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 10; 
            background: #050505; 
            border-bottom: 1px solid #222;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 24px; letter-spacing: 0.15em; color: var(--accent); text-transform: lowercase; }

        /* はっきりと見えるボタンデザイン */
        .file-inputs { display: flex; gap: 15px; align-items: center; }
        .file-input-label { 
            font-size: 11px; 
            font-weight: 600;
            letter-spacing: 0.05em; 
            color: #ddd; 
            cursor: pointer; 
            background: var(--btn-bg);
            border: 1px solid #444; 
            padding: 10px 20px; 
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .file-input-label::before {
            content: '＋';
            color: var(--accent);
            font-size: 14px;
        }
        .file-input-label:hover { 
            border-color: var(--accent); 
            background: #252525;
            transform: translateY(-1px);
        }
        .file-input-label.loaded {
            border-color: #2e7d32;
            background: #1b2e1b;
        }
        input[type="file"] { display: none; }

        #comparison-container {
            position: relative;
            flex-grow: 1;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: ew-resize;
        }

        canvas { max-width: 100%; max-height: 100%; object-fit: contain; }

        .controls {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            background: #050505;
            border-top: 1px solid #222;
        }

        #record-btn {
            padding: 14px 50px;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: all 0.4s ease;
            border-radius: 4px;
        }
        #record-btn:hover:not(:disabled) { background: var(--accent); color: #000; box-shadow: 0 0 20px rgba(201, 169, 110, 0.3); }
        #record-btn:disabled { opacity: 0.2; cursor: not-allowed; border-color: #333; color: #555; }
        #record-btn.recording { background: #b71c1c; border-color: #ff5252; color: #fff; animation: pulse 2s infinite; }

        .hint { font-size: 10px; color: #555; letter-spacing: 0.1em; text-transform: uppercase; }
        #status { 
            position: fixed; top: 85px; left: 50%; transform: translateX(-50%); 
            font-size: 11px; font-weight: 600; color: var(--accent); z-index: 20; 
            background: rgba(0,0,0,0.8); padding: 6px 20px; border: 1px solid #333; border-radius: 30px;
            letter-spacing: 0.1em;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div class="logo">masiro <span>Generator</span></div>
    <div class="file-inputs">
        <label class="file-input-label" id="label-before">Select Before (Base)<input type="file" id="before-file" accept="image/*"></label>
        <label class="file-input-label" id="label-after">Select After (Overlay)<input type="file" id="after-file" accept="image/*"></label>
    </div>
</header>

<div id="status">Images Required</div>

<div id="comparison-container">
    <canvas id="compCanvas"></canvas>
</div>

<div class="controls">
    <button id="record-btn" disabled>Ready to Capture</button>
    <p class="hint">Automatic 2-cycle MP4 Motion Export</p>
</div>

<script>
    const canvas = document.getElementById('compCanvas');
    const ctx = canvas.getContext('2d');
    const recordBtn = document.getElementById('record-btn');
    const status = document.getElementById('status');
    const beforeFile = document.getElementById('before-file');
    const afterFile = document.getElementById('after-file');
    const labelBefore = document.getElementById('label-before');
    const labelAfter = document.getElementById('label-after');

    let imgBefore = new Image();
    let imgAfter = new Image();
    let sliderPos = 0.5;
    let beforeReady = false;
    let afterReady = false;

    function handleFile(file, isBefore) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = isBefore ? imgBefore : imgAfter;
            img.onload = () => {
                if (isBefore) {
                    beforeReady = true;
                    labelBefore.classList.add('loaded');
                    labelBefore.textContent = "Before: OK";
                } else {
                    afterReady = true;
                    labelAfter.classList.add('loaded');
                    labelAfter.textContent = "After: OK";
                }
                
                if (beforeReady && afterReady) {
                    recordBtn.disabled = false;
                    status.textContent = "Ready to Compare";
                    resize();
                } else {
                    status.textContent = "One more image needed";
                }
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    beforeFile.onchange = (e) => handleFile(e.target.files[0], true);
    afterFile.onchange = (e) => handleFile(e.target.files[0], false);

    function resize() {
        if (!beforeReady || !afterReady) return;
        const containerWidth = canvas.parentElement.clientWidth;
        const containerHeight = canvas.parentElement.clientHeight;
        const imgAspect = imgBefore.width / imgBefore.height;
        const containerAspect = containerWidth / containerHeight;

        if (containerAspect > imgAspect) {
            canvas.height = containerHeight * window.devicePixelRatio;
            canvas.width = canvas.height * imgAspect;
        } else {
            canvas.width = containerWidth * window.devicePixelRatio;
            canvas.height = canvas.width / imgAspect;
        }
        render();
    }
    window.addEventListener('resize', resize);

    function render() {
        if (!beforeReady || !afterReady) return;
        const w = canvas.width;
        const h = canvas.height;
        ctx.clearRect(0, 0, w, h);
        ctx.drawImage(imgBefore, 0, 0, w, h);
        ctx.save();
        ctx.beginPath();
        ctx.rect(0, 0, w * sliderPos, h);
        ctx.clip();
        ctx.drawImage(imgAfter, 0, 0, w, h);
        ctx.restore();
        ctx.strokeStyle = '#c9a96e';
        ctx.lineWidth = 4 * window.devicePixelRatio;
        ctx.beginPath();
        ctx.moveTo(w * sliderPos, 0);
        ctx.lineTo(w * sliderPos, h);
        ctx.stroke();
    }

    const handleMove = (e) => {
        if (!beforeReady || !afterReady) return;
        const rect = canvas.getBoundingClientRect();
        const clientX = (e.pageX || (e.touches ? e.touches[0].pageX : 0));
        sliderPos = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
        render();
    };
    canvas.addEventListener('mousemove', (e) => { if(e.buttons === 1) handleMove(e); });
    canvas.addEventListener('mousedown', handleMove);
    canvas.addEventListener('touchstart', handleMove);
    canvas.
